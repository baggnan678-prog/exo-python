<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CalcSci — Calculatrice Scientifique</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <header>
    <h1>CALCSCI</h1>
    <p>CALCULATRICE SCIENTIFIQUE · UTM BURKINA FASO</p>
  </header>

  <main class="calculator">

    <!-- ── Onglets ── -->
    <nav class="tabs">
      <button class="tab-btn active" data-tab="tab-calc">CALCUL</button>
      <button class="tab-btn" data-tab="tab-matrix">MATRICES</button>
      <button class="tab-btn" data-tab="tab-stats">STATISTIQUES</button>
    </nav>

    <!-- ══════════════════════════════════════
         ONGLET 1 — CALCULATRICE SCIENTIFIQUE
         ══════════════════════════════════════ -->
    <section id="tab-calc" class="tab-panel active">

      <!-- Écran -->
      <div class="display">
        <div class="display-input" id="display-input"></div>
        <div class="display-result" id="display-result">0</div>
      </div>

      <!-- Contrôles supérieurs -->
      <div class="top-controls">
        <!-- Mode DEG/RAD -->
        <div class="mode-toggle">
          <span class="mode-label">MODE</span>
          <button class="mode-btn active" data-mode="deg">DEG</button>
          <button class="mode-btn" data-mode="rad">RAD</button>
        </div>
        <!-- Affichage 2nd -->
        <button class="btn btn-2nd" id="btn-2nd">2nd</button>
      </div>

      <!-- Grille de boutons (5 colonnes) -->
      <div class="btn-grid calc-grid">

        <!-- ── Ligne 1 : fonctions trig ── -->
        <button class="btn btn-func calc-key" data-value="sin(" data-alt="asin(">
          <span class="btn-primary">sin</span>
          <span class="btn-secondary">sin⁻¹</span>
        </button>
        <button class="btn btn-func calc-key" data-value="cos(" data-alt="acos(">
          <span class="btn-primary">cos</span>
          <span class="btn-secondary">cos⁻¹</span>
        </button>
        <button class="btn btn-func calc-key" data-value="tan(" data-alt="atan(">
          <span class="btn-primary">tan</span>
          <span class="btn-secondary">tan⁻¹</span>
        </button>
        <button class="btn btn-func calc-key" data-value="log(" data-alt="exp2(">
          <span class="btn-primary">log</span>
          <span class="btn-secondary">10^x</span>
        </button>
        <button class="btn btn-func calc-key" data-value="ln(" data-alt="exp(">
          <span class="btn-primary">ln</span>
          <span class="btn-secondary">e^x</span>
        </button>

        <!-- ── Ligne 2 : fonctions hyperboliques ── -->
        <button class="btn btn-func calc-key" data-value="sinh(" data-alt="asinh(">
          <span class="btn-primary">sinh</span>
          <span class="btn-secondary">sinh⁻¹</span>
        </button>
        <button class="btn btn-func calc-key" data-value="cosh(" data-alt="acosh(">
          <span class="btn-primary">cosh</span>
          <span class="btn-secondary">cosh⁻¹</span>
        </button>
        <button class="btn btn-func calc-key" data-value="tanh(" data-alt="atanh(">
          <span class="btn-primary">tanh</span>
          <span class="btn-secondary">tanh⁻¹</span>
        </button>
        <button class="btn btn-func calc-key" data-value="log2(" data-alt="logn(">
          <span class="btn-primary">log₂</span>
          <span class="btn-secondary">logₙ</span>
        </button>
        <button class="btn btn-func calc-key" data-value="sqrt(" data-alt="cbrt(">
          <span class="btn-primary">√</span>
          <span class="btn-secondary">∛</span>
        </button>

        <!-- ── Ligne 3 : puissances, constantes, arrondi ── -->
        <button class="btn btn-func calc-key" data-value="**2" data-alt="**3">
          <span class="btn-primary">x²</span>
          <span class="btn-secondary">x³</span>
        </button>
        <button class="btn btn-func calc-key" data-value="^" data-alt="pow(">
          <span class="btn-primary">x^y</span>
          <span class="btn-secondary">pow</span>
        </button>
        <button class="btn btn-func calc-key" data-value="factorial(" data-alt="comb(">
          <span class="btn-primary">n!</span>
          <span class="btn-secondary">C(n,k)</span>
        </button>
        <button class="btn btn-func calc-key" data-value="floor(" data-alt="ceil(">
          <span class="btn-primary">⌊x⌋</span>
          <span class="btn-secondary">⌈x⌉</span>
        </button>
        <button class="btn btn-func calc-key" data-value="abs(" data-alt="sign(">
          <span class="btn-primary">|x|</span>
          <span class="btn-secondary">sgn</span>
        </button>

        <!-- ── Ligne 4 : constantes, mémoire, effacement ── -->
        <button class="btn btn-func calc-key" data-value="pi" data-alt="tau">
          <span class="btn-primary">π</span>
          <span class="btn-secondary">τ</span>
        </button>
        <button class="btn btn-func calc-key" data-value="e" data-alt="1/">
          <span class="btn-primary">e</span>
          <span class="btn-secondary">1/x</span>
        </button>
        <button class="btn btn-func calc-key" data-value="(" data-alt=")">
          <span class="btn-primary">(</span>
          <span class="btn-secondary">)</span>
        </button>
        <button class="btn btn-clear calc-key" data-value="C">C</button>
        <button class="btn btn-clear calc-key" data-value="⌫">⌫</button>

        <!-- ── Ligne 5 : 7 8 9 / % ── -->
        <button class="btn calc-key" data-value="7">7</button>
        <button class="btn calc-key" data-value="8">8</button>
        <button class="btn calc-key" data-value="9">9</button>
        <button class="btn btn-op calc-key" data-value="/">/</button>
        <button class="btn btn-op calc-key" data-value="%">%</button>

        <!-- ── Ligne 6 : 4 5 6 * ── -->
        <button class="btn calc-key" data-value="4">4</button>
        <button class="btn calc-key" data-value="5">5</button>
        <button class="btn calc-key" data-value="6">6</button>
        <button class="btn btn-op calc-key" data-value="*">×</button>
        <button class="btn btn-op calc-key" data-value=",">,</button>

        <!-- ── Ligne 7 : 1 2 3 - ── -->
        <button class="btn calc-key" data-value="1">1</button>
        <button class="btn calc-key" data-value="2">2</button>
        <button class="btn calc-key" data-value="3">3</button>
        <button class="btn btn-op calc-key" data-value="-">−</button>
        <button class="btn btn-op calc-key" data-value="+">+</button>

        <!-- ── Ligne 8 : 0 . = ── -->
        <button class="btn calc-key btn-wide" data-value="0">0</button>
        <button class="btn calc-key" data-value=".">.</button>
        <button class="btn btn-func calc-key" data-value="+/-">±</button>
        <button class="btn btn-eq calc-key btn-wide" data-value="=">=</button>

      </div>

      <!-- Historique -->
      <div class="history-section">
        <div class="history-title">▸ HISTORIQUE</div>
        <div class="history-list" id="history-list"></div>
      </div>

    </section>


    <!-- ══════════════════════════════════════
         ONGLET 2 — MATRICES
         ══════════════════════════════════════ -->
    <section id="tab-matrix" class="tab-panel">

      <div class="matrix-section">
        <div class="section-title">MATRICE A</div>
        <div class="matrix-size-select">
          <label for="size-a">Taille :</label>
          <select id="size-a">
            <option value="2" selected>2 × 2</option>
            <option value="3">3 × 3</option>
            <option value="4">4 × 4</option>
          </select>
        </div>
        <div class="matrix-input-grid" id="matrix-a-grid"></div>
      </div>

      <div class="matrix-section">
        <div class="section-title">MATRICE B <span style="font-size:0.5rem;color:var(--text-muted)">(Addition / Multiplication)</span></div>
        <div class="matrix-size-select">
          <label for="size-b">Taille :</label>
          <select id="size-b">
            <option value="2" selected>2 × 2</option>
            <option value="3">3 × 3</option>
            <option value="4">4 × 4</option>
          </select>
        </div>
        <div class="matrix-input-grid" id="matrix-b-grid"></div>
      </div>

      <div class="section-title">OPÉRATIONS</div>
      <div class="btn-grid matrix-grid">
        <button class="btn btn-func matrix-op-btn" data-op="add">A + B</button>
        <button class="btn btn-func matrix-op-btn" data-op="multiply">A · B</button>
        <button class="btn btn-func matrix-op-btn" data-op="transpose">Aᵀ</button>
        <button class="btn btn-func matrix-op-btn" data-op="det">det(A)</button>
        <button class="btn btn-func matrix-op-btn" data-op="inverse">A⁻¹</button>
      </div>

      <div class="matrix-result-display" id="matrix-result">—</div>

    </section>


    <!-- ══════════════════════════════════════
         ONGLET 3 — STATISTIQUES
         ══════════════════════════════════════ -->
    <section id="tab-stats" class="tab-panel">

      <div class="section-title">JEUX DE DONNÉES</div>

      <div class="stats-input-area">
        <label for="stats-input">Entrez vos valeurs (séparées par espace, virgule ou retour à la ligne) :</label>
        <textarea id="stats-input" placeholder="Ex: 4, 8, 15, 16, 23, 42"></textarea>
      </div>

      <div class="btn-grid stats-grid">
        <button class="btn btn-eq btn-wide" id="btn-stats-calc">CALCULER</button>
      </div>

      <div class="stats-results" id="stats-results"></div>

    </section>

  </main>

  <footer>
    <p>CALCSCI v2.0 · PYTHON / FLASK · GÉNIE LOGICIEL UTM</p>
  </footer>

  <script src="{{ url_for('static', filename='js/script.js') }}"></script>
</body>
</html>
